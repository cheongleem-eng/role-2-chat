<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>제주항공 비상훈련 롤플레잉</title>
  <link rel="stylesheet" href="style.css" />
  <!-- 🔥 Firebase SDK (compat version — Firebase Studio 호환) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- SheetJS for Excel Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="screen-login" class="screen active">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo-wrap">
          <img src="LOGO.png" alt="제주항공 로고" class="logo-img">
          <p class="logo-sub">Cabin Training System</p>
        </div>

        <div class="form-container">
          <div class="form-group">
            <label>나의 이름 (평가자)</label>
            <input type="text" id="input-evaluator-name" placeholder="이름을 입력하세요" />
          </div>

          <div class="form-group">
            <label>평가 대상 (객실승무원)</label>
            <input type="text" id="input-trainee-name" placeholder="승무원 이름 입력" />
          </div>

          <div class="form-group">
            <label>훈련 날짜</label>
            <input type="date" id="input-date" />
          </div>

          <button class="btn-primary main-start-btn" onclick="startSession()">
            훈련 시작하기
          </button>
        </div>

        <div class="login-footer">
          <button class="btn-text-only" onclick="promptAdminLogin()">
            관리자 메뉴
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== MAIN ROLEPLAY & EVALUATION SCREEN ===================== -->
  <div id="screen-main" class="screen">
    <header class="app-header">
      <div class="header-left">
        <span class="header-badge">롤플레잉</span>
      </div>
      <div class="header-center" id="header-names">
        <!-- Rendered via JS -->
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="goHome()">
          <i class="ph ph-house"></i>
        </button>
      </div>
    </header>

    <!-- Phase navigation -->
    <div class="phase-nav" id="phase-nav"></div>

    <!-- Scrollable Content Area -->
    <div class="scroll-content">
      <div class="phase-card" id="phase-card">
        <div class="phase-header">
          <span class="phase-number" id="phase-number"></span>
          <h2 class="phase-title" id="phase-title"></h2>
        </div>

        <!-- Unified Roleplay & Rating Section -->
        <div id="section-unified">
          <div class="instruction-box" id="instruction-box">
            <p class="instruction-label blink-text"><i class="ph-fill ph-warning-circle"></i> 나의 행동 지시</p>
            <p class="instruction-text" id="instruction-text"></p>
          </div>
          <div class="question-box" id="question-box" style="display:none;">
            <p class="question-label"><i class="ph-fill ph-chat-circle-text"></i> 승무원에게 이 질문을 하세요</p>
            <p class="question-text" id="question-text"></p>
          </div>
          
          <div class="rating-section" style="margin-top: 12px;">
            <p class="rating-label">승무원 대처 평가 (점수 클릭 시 자동 저장 및 다음)</p>
            <div class="emoji-rating" id="emoji-rating">
              <button class="emoji-btn level-1" data-score="1" onclick="setRatingAndSave(1)" title="매우 불만족"><i class="ph-duotone ph-smiley-angry"></i></button>
              <button class="emoji-btn level-2" data-score="2" onclick="setRatingAndSave(2)" title="불만족"><i class="ph-duotone ph-smiley-sad"></i></button>
              <button class="emoji-btn level-3" data-score="3" onclick="setRatingAndSave(3)" title="보통"><i class="ph-duotone ph-smiley-meh"></i></button>
              <button class="emoji-btn level-4" data-score="4" onclick="setRatingAndSave(4)" title="만족"><i class="ph-duotone ph-smiley"></i></button>
              <button class="emoji-btn level-5" data-score="5" onclick="setRatingAndSave(5)" title="매우 만족"><i class="ph-duotone ph-star"></i></button>
            </div>
            <div class="rating-labels-row">
              <span>매우 불만족</span><span>불만족</span><span>보통</span><span>만족</span><span>매우 만족</span>
            </div>
            <div class="save-toast" id="save-toast"><i class="ph-bold ph-check"></i> 저장 후 다음으로 이동합니다...</div>
          </div>
        </div>
      </div>
      
      <!-- End Training Button -->
      <div style="padding: 16px;">
        <button class="btn-primary" style="background-color: var(--jeju-navy); box-shadow: 0 4px 14px rgba(21, 25, 40, 0.2);" onclick="confirmEndTraining()">
          <i class="ph-bold ph-flag-checkered"></i> 훈련 종료 (결과 보기)
        </button>
      </div>
    </div>

    <!-- Navigation buttons fixed at bottom -->
    <div class="bottom-nav">
      <button class="btn-secondary" id="btn-prev" onclick="changePhase(-1)"><i class="ph-bold ph-caret-left"></i> 이전</button>
      <span class="phase-indicator" id="phase-indicator"></span>
      <button class="btn-secondary" id="btn-next" onclick="changePhase(1)">다음 <i class="ph-bold ph-caret-right"></i></button>
    </div>
  </div>

  <!-- ===================== SUMMARY SCREEN ===================== -->
  <div id="screen-summary" class="screen">
    <header class="app-header">
      <div class="header-left">
        <button class="btn-icon" onclick="backToMain()">
          <i class="ph-bold ph-caret-left"></i>
        </button>
      </div>
      <div class="header-center">전체 결과 요약</div>
      <div class="header-right">
        <button class="btn-icon" onclick="goHome()">
          <i class="ph-bold ph-house"></i>
        </button>
      </div>
    </header>
    
    <div class="scroll-content">
      <div class="summary-content" id="summary-content"></div>
      
      <div style="padding:0 16px 24px;">
        <p style="font-size:13px; color:var(--text-secondary); margin-bottom:16px; text-align:center;">모든 평가 데이터는 클라우드에 안전하게 저장되었습니다.<br>전체 데이터는 관리자 메뉴에서 다운로드할 수 있습니다.</p>
        <button class="btn-primary" onclick="goHome()">메인 화면으로 돌아가기 <i class="ph-bold ph-house"></i></button>
      </div>
    </div>
  </div>

  <!-- ===================== ADMIN SCREEN ===================== -->
  <div id="screen-admin" class="screen">
    <header class="app-header">
      <div class="header-left">
        <button class="btn-icon" onclick="goHome()">
          <i class="ph-bold ph-caret-left"></i>
        </button>
      </div>
      <div class="header-center"><i class="ph-fill ph-lock-key"></i> 관리자 대시보드</div>
      <div class="header-right">
        <button class="btn-icon" onclick="goHome()">
          <i class="ph-bold ph-house"></i>
        </button>
      </div>
    </header>
    
    <div class="scroll-content">
      <div class="admin-content">
        <p style="font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text-primary);">일자별 데이터 다운로드</p>
        <div id="admin-date-list" style="display:flex; flex-direction:column; gap:12px;"></div>
        
        <div style="margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--border);">
          <button class="btn-outline" style="border-color:var(--success); color:var(--success);" onclick="downloadAllExcel()">
            <i class="ph-bold ph-download-simple"></i> 전체 데이터 통합 다운로드
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
